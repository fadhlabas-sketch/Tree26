<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,user-scalable=yes"/>
  <title>شجرة العائلة</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#3d1f00"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="شجرة العائلة"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<!-- شريط الأدوات -->
<header class="top-bar">
  <div class="tb-right">
    <span class="tree-logo">🌳</span>
    <h1 class="tree-title">شجرة عائلة البوطالب البياتي</h1>
  </div>
  <div class="tb-left">
    <div class="search-wrap">
      <input id="searchInput" class="search-input" type="text" placeholder="ابحث عن اسم…" autocomplete="off"/>
      <button id="searchBtn" class="search-btn">🔍</button>
      <div id="searchDrop" class="search-drop"></div>
    </div>
    <button id="btnAdmin" class="icon-btn" title="لوحة الإدارة">⚙</button>
  </div>
</header>

<!-- حاوية الشجرة — D3 يُنشئ SVG هنا -->
<div id="treeWrap" class="tree-wrap"></div>

<!-- شاشة التحميل -->
<div id="loader" class="loader">
  <div class="loader-box">
    <div class="loader-tree">🌳</div>
    <p id="loaderMsg">جاري تحميل شجرة العائلة…</p>
  </div>
</div>

<!-- لوحة التفاصيل -->
<div id="detailPanel" class="detail-panel">
  <button id="closeDetail" class="panel-close">✕</button>
  <div id="detailBody"></div>
</div>
<div id="panelOverlay" class="panel-overlay"></div>

<!-- القائمة المنبثقة -->
<div id="ctxMenu" class="ctx-menu">
  <div class="ctx-item" id="ctxView">   <span class="ci">👁</span>  عرض التفاصيل     </div>
  <div class="ctx-item" id="ctxChild">  <span class="ci">👶</span>  إضافة ابن  </div>
  <div class="ctx-item" id="ctxEdit">   <span class="ci">✏️</span> تعديل البيانات    </div>
  <div class="ctx-item" id="ctxLineage"><span class="ci">🔗</span>  إظهار الأصل       </div>
  <div class="ctx-item ctx-danger" id="ctxDelete" style="display:none"><span class="ci">🗑️</span> حذف العضو</div>
</div>

<!-- نافذة النماذج -->
<div id="modalBack" class="modal-back">
  <div class="modal-box">
    <button id="closeModal" class="panel-close">✕</button>
    <div id="modalBody"></div>
  </div>
</div>

<!-- لوحة الإدارة -->
<div id="adminBack" class="modal-back">
  <div class="modal-box admin-box">
    <div class="admin-head">
      <h2>لوحة الإدارة</h2>
      <button id="closeAdmin" class="panel-close">✕</button>
    </div>
    <div id="adminLogin" class="admin-login">
      <p>أدخل كلمة المرور</p>
      <input id="adminPw" type="password" class="form-input" placeholder="كلمة المرور"/>
      <button id="adminLoginBtn" class="btn-gold">دخول</button>
    </div>
    <div id="adminContent" style="display:none">
      <div class="admin-tabs">
        <button class="atab active" data-tab="children">طلبات الأبناء</button>
        <button class="atab" data-tab="updates">طلبات التعديل</button>
      </div>
      <div id="atChildren"></div>
      <div id="atUpdates" style="display:none"></div>
    </div>
  </div>
</div>

<!-- شاشة تثبيت PWA -->
<div id="installScreen" class="install-screen" style="display:none">
  <div class="install-box">
    <div style="font-size:56px;margin-bottom:12px">🌳</div>
    <h2 class="install-title">شجرة العائلة</h2>
    <p class="install-desc">ثبّت التطبيق للوصول السريع والعمل بدون إنترنت</p>
    <button id="installBtn" class="btn-gold">📲 تثبيت التطبيق</button>
    <button id="installSkip" class="btn-skip">متابعة بدون تثبيت ←</button>
    <p id="installNote" class="install-note"></p>
  </div>
</div>

<!-- أزرار الأسفل -->
<div class="bottom-bar">
  <button id="btnRefresh" class="bb-btn">🔄 تحديث</button>
  <button id="btnStats"   class="bb-btn">📊 إحصائيات</button>
  <button id="btnCenter"  class="bb-btn">🎯 توسيط</button>
</div>

<!-- إشعار -->
<div id="toast" class="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script src="js/main.js"></script>
</body>
</html>
